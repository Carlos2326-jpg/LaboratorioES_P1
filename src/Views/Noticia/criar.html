<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Postagem - Blog de Notícias</title>
    <link rel="stylesheet" href="../../_shared/css/base.css" />
    <link rel="stylesheet" href="../../_shared/css/components.css" />
    <style>
      .admin-page {
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }
      .page-header h1 {
        font-size: 1.75rem;
        margin: 0;
      }

      .form-section {
        background: white;
        border-radius: 8px;
        padding: 2rem;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
        margin-bottom: 1.5rem;
      }
      .form-section h2 {
        font-size: 1.25rem;
        margin-bottom: 1.5rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid #2563eb;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
      }
      .campo.full {
        grid-column: 1 / -1;
      }
      .campo textarea {
        min-height: 200px;
        resize: vertical;
        font-family: inherit;
      }
      .checkbox-group {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        background: #f9fafb;
        padding: 1.25rem;
        border-radius: 8px;
      }
      .checkbox-item {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        cursor: pointer;
      }
      .checkbox-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
      }

      .botoes-acao {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
      }
      .btn-primario,
      .btn-secundario {
        flex: 1;
        padding: 0.875rem 1.5rem;
        font-size: 1rem;
        font-weight: 500;
        border-radius: 8px;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
      }
      .btn-primario {
        background: #2563eb;
        color: white;
      }
      .btn-primario:hover {
        background: #1d4ed8;
      }
      .btn-secundario {
        background: transparent;
        color: #2563eb;
        border: 2px solid #2563eb;
      }
      .btn-secundario:hover {
        background: #2563eb;
        color: white;
      }

      .schedule-group {
        background: #f9fafb;
        padding: 1.25rem;
        border-radius: 8px;
        margin-top: 1rem;
      }
      .schedule-group.hidden {
        display: none;
      }

      .categoria-count {
        font-size: 0.875rem;
        color: #6b7280;
        margin-bottom: 1rem;
      }
      .sem-categorias {
        color: #6b7280;
        font-style: italic;
      }

      @media (max-width: 768px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
        .botoes-acao {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div id="header-container"></div>

    <main class="admin-page">
      <div class="page-header">
        <h1>✍️ Nova Postagem</h1>
        <div>
          <a href="/usuario/minhas-postagens" class="btn btn-secundario"
            >← Minhas Postagens</a
          >
        </div>
      </div>

      <div id="alert-container"></div>

      <form id="post-form" class="form-section">
        <!-- Dados básicos -->
        <h2>📝 Dados da Postagem</h2>
        <div class="form-grid">
          <div class="campo">
            <label for="titulo">Título *</label>
            <input
              type="text"
              id="titulo"
              required
              maxlength="200"
              placeholder="Digite o título da notícia"
            />
            <small id="slug-preview"></small>
          </div>
          <div class="campo">
            <label for="slug">Slug (URL)</label>
            <input type="text" id="slug" placeholder="gerado automaticamente" />
          </div>
          <div class="campo">
            <label for="subtitulo">Subtítulo</label>
            <input
              type="text"
              id="subtitulo"
              maxlength="200"
              placeholder="Opcional"
            />
          </div>
          <div class="campo">
            <label for="resumo">Resumo (150 caracteres)</label>
            <textarea
              id="resumo"
              maxlength="150"
              placeholder="Resumo para prévia"
            ></textarea>
            <small id="resumo-count">0/150</small>
          </div>
        </div>

        <!-- Conteúdo -->
        <div class="campo full">
          <label for="conteudo">Conteúdo *</label>
          <textarea
            id="conteudo"
            required
            placeholder="Escreva o conteúdo completo da notícia..."
          ></textarea>
        </div>

        <!-- Imagem -->
        <div class="form-grid">
          <div class="campo">
            <label for="imagem_destaque">URL da Imagem Destaque</label>
            <input
              type="url"
              id="imagem_destaque"
              placeholder="https://exemplo.com/imagem.jpg"
            />
            <small>Recomendado: 1200x600px</small>
          </div>
          <div class="campo">
            <label for="imagem_alt">Texto alternativo da imagem</label>
            <input
              type="text"
              id="imagem_alt"
              placeholder="Descrição da imagem para acessibilidade"
            />
          </div>
        </div>

        <!-- Opções avançadas -->
        <h2>⚙️ Opções Avançadas</h2>
        <div class="form-grid">
          <div class="campo">
            <label>
              <input type="checkbox" id="destaque" /> Marcar como destaque na
              home
            </label>
          </div>
          <div class="campo">
            <label>
              <input type="checkbox" id="schedule" /> Agendar publicação
            </label>
          </div>
        </div>

        <!-- Campos de agendamento -->
        <div class="schedule-group hidden" id="schedule-fields">
          <div class="form-grid">
            <div class="campo">
              <label for="dataPostagem">Data</label>
              <input type="date" id="dataPostagem" />
            </div>
            <div class="campo">
              <label for="horaPostagem">Hora</label>
              <input type="time" id="horaPostagem" />
            </div>
          </div>
        </div>

        <!-- Categorias -->
        <div class="campo full">
          <label>Categorias * (selecione pelo menos 1)</label>
          <div class="categoria-count" id="categoria-count">
            Carregando categorias...
          </div>
          <div id="categorias-container" class="checkbox-group sem-categorias">
            Carregando...
          </div>
        </div>

        <!-- Botões -->
        <div class="botoes-acao">
          <button type="submit" class="btn-primario" id="btn-publicar">
            🚀 Publicar
          </button>
          <button type="button" class="btn-secundario" id="btn-rascunho">
            💾 Salvar Rascunho
          </button>
        </div>
      </form>
    </main>

    <script src="/_shared/js/utils.js"></script>
    <script>
      // === VERIFICA AUTENTICAÇÃO ===
      const usuario = getUsuarioLogado();
      if (
        !usuario ||
        !["admin", "editor", "autor"].includes(usuario.nivelAcesso)
      ) {
        showAlert("Acesso negado. Faça login como autor ou superior.", "error");
        setTimeout(() => (window.location.href = "/usuario/login"), 2000);
      }

      // === HEADER ===
      document.getElementById("header-container").innerHTML = `
            <nav class="navbar">
                <div class="navbar__inner">
                    <a href="/home" class="navbar__logo">📰 Blog de Notícias</a>
                    <div class="navbar__acoes">
                        <span>Olá, ${usuario.nomeCompleto?.split(" ")[0] || "Usuário"}</span>
                        <a href="/home" class="btn btn-secundario">← Home</a>
                        <a href="/usuario/minhas-postagens" class="btn btn-secundario">📝 Minhas</a>
                        <button class="btn btn-secundario" onclick="logout()">Sair</button>
                    </div>
                </div>
            </nav>
        `;

      let categorias = [];

      // === CARREGAR CATEGORIAS ===
      async function carregarCategorias() {
        try {
          const response = await fetch(`${API_URL}/categorias`);
          const result = await response.json();

          if (result.success) {
            categorias = result.data.filter((cat) => cat.status === "ativo");
            renderizarCategorias();
          }
        } catch (error) {
          console.error("Erro categorias:", error);
          document.getElementById("categorias-container").innerHTML =
            '<span style="color: #dc2626;">Erro ao carregar categorias</span>';
        }
      }

      function renderizarCategorias() {
        const container = document.getElementById("categorias-container");
        const countEl = document.getElementById("categoria-count");

        if (categorias.length === 0) {
          container.innerHTML = "<span>Nenhuma categoria disponível</span>";
          return;
        }

        container.innerHTML = categorias
          .map(
            (cat) => `
                <label class="checkbox-item">
                    <input type="checkbox" value="${cat.idCategoria}">
                    <span>${cat.nome}${cat.total_postagens ? ` (${cat.total_postagens})` : ""}</span>
                </label>
            `,
          )
          .join("");

        countEl.textContent = `Selecione pelo menos 1 de ${categorias.length} categorias`;
      }

      // === EVENTOS ===
      document.getElementById("titulo").addEventListener("input", (e) => {
        const slug = gerarSlug(e.target.value);
        document.getElementById("slug").value = slug;
        document.getElementById("slug-preview").textContent =
          `/noticia/${slug}`;
      });

      document.getElementById("resumo").addEventListener("input", (e) => {
        document.getElementById("resumo-count").textContent =
          `${e.target.value.length}/150`;
      });

      document.getElementById("schedule").addEventListener("change", (e) => {
        document
          .getElementById("schedule-fields")
          .classList.toggle("hidden", !e.target.checked);
      });

      // === SUBMIT ===
      document
        .getElementById("post-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          await salvarPostagem("publicado");
        });

      document.getElementById("btn-rascunho").addEventListener("click", () => {
        salvarPostagem("rascunho");
      });

      async function salvarPostagem(status) {
        const titulo = document.getElementById("titulo").value.trim();
        const conteudo = document.getElementById("conteudo").value.trim();
        const checkboxes = document.querySelectorAll(
          "#categorias-container input:checked",
        );
        const categorias = Array.from(checkboxes).map((cb) =>
          parseInt(cb.value),
        );

        // Validações
        if (!titulo || titulo.length < 3) {
          showAlert("Título deve ter pelo menos 3 caracteres", "error");
          return;
        }
        if (!conteudo || conteudo.length < 10) {
          showAlert("Conteúdo deve ter pelo menos 10 caracteres", "error");
          return;
        }
        if (categorias.length === 0) {
          showAlert("Selecione pelo menos 1 categoria", "error");
          return;
        }

        const dados = {
          titulo,
          subTitulo:
            document.getElementById("subtitulo").value.trim() || undefined,
          slug: document.getElementById("slug").value.trim(),
          resumo: document.getElementById("resumo").value.trim() || undefined,
          conteudo,
          imagem_destaque:
            document.getElementById("imagem_destaque").value.trim() ||
            undefined,
          imagem_alt:
            document.getElementById("imagem_alt").value.trim() || undefined,
          destaque: document.getElementById("destaque").checked,
          status,
          categorias,
        };

        // Agendamento
        if (document.getElementById("schedule").checked) {
          const data = document.getElementById("dataPostagem").value;
          const hora = document.getElementById("horaPostagem").value;
          if (data && hora) {
            dados.dataPostagem = `${data} ${hora}:00`;
          }
        }

        try {
          showAlert("Salvando...", "info");
          const response = await fetch(`${API_URL}/postagens`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...getAuthHeader(),
            },
            body: JSON.stringify(dados),
          });

          const result = await response.json();

          if (result.success) {
            showAlert(
              `Postagem ${status === "publicado" ? "publicada" : "salva como rascunho"}! 🎉`,
              "success",
            );
            setTimeout(() => {
              window.location.href = "/usuario/minhas-postagens";
            }, 2000);
          } else {
            showAlert(result.error, "error");
          }
        } catch (error) {
          console.error("Erro:", error);
          showAlert("Erro ao salvar postagem", "error");
        }
      }

      // === INICIALIZAÇÃO ===
      carregarCategorias();
      console.log("✅ Criar postagem carregada!");
    </script>
  </body>
</html>
