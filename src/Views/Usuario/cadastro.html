<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - Blog de Notícias</title>
    <link rel="stylesheet" href="../_shared/css/base.css" />
    <link rel="stylesheet" href="../_shared/css/components.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="auth-card">
        <h1>Criar Conta</h1>
        <p class="subtitulo">Cadastre-se para começar a publicar</p>

        <div id="alert-container"></div>

        <form id="form-cadastro">
          <div class="campo">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" required />
          </div>

          <div class="campo">
            <label for="email">E-mail</label>
            <input type="email" id="email" required />
          </div>

          <div class="campo">
            <label for="confirmar-email">Confirmar e-mail</label>
            <input type="email" id="confirmar-email" required />
          </div>

          <div class="campo">
            <label for="senha">Senha</label>
            <input type="password" id="senha" required />
            <small>Mínimo 8 caracteres</small>
          </div>

          <div class="campo">
            <label for="confirmar-senha">Confirmar senha</label>
            <input type="password" id="confirmar-senha" required />
          </div>

          <button type="submit" class="btn btn-primario">Cadastrar</button>
        </form>

        <p class="auth-link">
          Já tem conta? <a href="/usuario/login">Entrar</a>
        </p>
      </div>
    </main>

    <script src="/_shared/js/utils.js"></script>
    <script src="/Usuario/js/cadastro.js" type="module"></script>
  </body>
</html>
