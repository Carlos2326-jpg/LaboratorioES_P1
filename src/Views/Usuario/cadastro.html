<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - Blog de Notícias</title>
    <link rel="stylesheet" href="../_shared/css/base.css" />
    <link rel="stylesheet" href="../_shared/css/components.css" />
    <style>
      .auth-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .auth-card {
        background: white;
        border-radius: 16px;
        padding: 2.5rem;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      }
      .logo {
        text-align: center;
        margin-bottom: 1rem;
      }
      .logo h1 {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 2.2rem;
        font-weight: 800;
        margin: 0;
      }
      .subtitulo {
        color: #6b7280;
        margin-bottom: 2rem;
        font-size: 0.95rem;
        text-align: center;
      }
      .campo {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      .campo label {
        font-weight: 500;
        color: #374151;
        font-size: 0.9rem;
      }
      .campo input {
        padding: 0.875rem 1rem;
        border: 2px solid #e5e7eb;
        border-radius: 12px;
        font-size: 1rem;
        transition: all 0.2s;
      }
      .campo input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        outline: none;
      }
      .campo small {
        color: #9ca3af;
        font-size: 0.8rem;
      }
      .btn-primario {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
        padding: 0.875rem 1.5rem;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: all 0.2s;
      }
      .btn-primario:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
      }
      .btn-primario:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
      .auth-links {
        display: flex;
        justify-content: space-between;
        margin-top: 1.5rem;
        font-size: 0.875rem;
      }
      .auth-link {
        color: #6b7280;
        text-decoration: none;
        transition: color 0.2s;
      }
      .auth-link:hover {
        color: #2563eb;
      }
      .alerta {
        padding: 1rem 1.25rem;
        border-radius: 12px;
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
        font-weight: 500;
      }
      .alerta-sucesso {
        background: #f0fdf4;
        color: #166534;
        border: 1px solid #bbf7d0;
      }
      .alerta-erro {
        background: #fef2f2;
        color: #dc2626;
        border: 1px solid #fecaca;
      }
      .password-strength {
        height: 4px;
        border-radius: 2px;
        margin-top: 0.25rem;
        transition: all 0.3s;
      }
      .strength-weak {
        background: #ef4444;
        width: 25%;
      }
      .strength-medium {
        background: #f59e0b;
        width: 50%;
      }
      .strength-strong {
        background: #10b981;
        width: 100%;
      }
      .navbar {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid #e5e7eb;
        padding: 1rem 1.5rem;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .navbar__inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 1100px;
        margin: 0 auto;
      }
      .navbar__logo {
        font-size: 1.5rem;
        font-weight: 800;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-decoration: none;
      }
      @media (max-width: 480px) {
        .auth-card {
          margin: 1rem;
          padding: 2rem 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar__inner">
        <a href="/" class="navbar__logo">📰 Blog de Notícias</a>
      </div>
    </nav>

    <main class="auth-page">
      <div class="auth-card">
        <div class="logo">
          <h1>Cadastro</h1>
        </div>
        <p class="subtitulo">Crie sua conta gratuita para começar a publicar</p>

        <!-- Alertas -->
        <div id="alert-container"></div>

        <form id="form-cadastro">
          <div class="campo">
            <label for="nome">Nome completo *</label>
            <input type="text" id="nome" required placeholder="João Silva" />
          </div>

          <div class="campo">
            <label for="email">E-mail *</label>
            <input
              type="email"
              id="email"
              required
              placeholder="joao@email.com"
            />
          </div>

          <div class="campo">
            <label for="confirmarEmail">Confirmar e-mail *</label>
            <input
              type="email"
              id="confirmarEmail"
              required
              placeholder="joao@email.com"
            />
          </div>

          <div class="campo">
            <label for="senha">Senha *</label>
            <input
              type="password"
              id="senha"
              required
              placeholder="Mínimo 8 caracteres"
              minlength="8"
            />
            <div class="password-strength" id="password-strength"></div>
            <small id="senha-info">Mínimo 8 caracteres</small>
          </div>

          <div class="campo">
            <label for="confirmarSenha">Confirmar senha *</label>
            <input
              type="password"
              id="confirmarSenha"
              required
              placeholder="Digite novamente"
            />
          </div>

          <button type="submit" class="btn-primario">Criar Minha Conta</button>
        </form>

        <div class="auth-links">
          <a href="/usuario/login" class="auth-link">Já tem conta? Entrar</a>
          <a href="/usuario/redefinir-senha" class="auth-link"
            >Esqueceu senha?</a
          >
        </div>
      </div>
    </main>

    <script src="/_shared/js/utils.js"></script>
    <script>
      // Password Strength Indicator
      const senhaInput = document.getElementById("senha");
      const strengthBar = document.getElementById("password-strength");
      const senhaInfo = document.getElementById("senha-info");

      senhaInput.addEventListener("input", () => {
        const senha = senhaInput.value;
        const length = senha.length;
        const hasUpper = /[A-Z]/.test(senha);
        const hasNumber = /\d/.test(senha);
        const hasSpecial = /[!@#$%^&*]/.test(senha);

        strengthBar.className = "password-strength";

        if (length < 8) {
          strengthBar.classList.add("strength-weak");
          senhaInfo.textContent = "Senha muito curta (mín. 8 caracteres)";
          senhaInfo.style.color = "#ef4444";
        } else if (length >= 8 && (hasUpper || hasNumber || hasSpecial)) {
          strengthBar.classList.add("strength-medium");
          senhaInfo.textContent = "Senha boa (adicione maiúsculas/números)";
          senhaInfo.style.color = "#f59e0b";
        } else {
          strengthBar.classList.add("strength-strong");
          senhaInfo.textContent = "Senha muito forte!";
          senhaInfo.style.color = "#10b981";
        }
      });

      // Real-time validation
      document
        .getElementById("confirmarEmail")
        .addEventListener("input", () => {
          const email = document.getElementById("email").value;
          const confirmEmail = document.getElementById("confirmarEmail").value;
          if (email && confirmEmail && email !== confirmEmail) {
            document.getElementById("confirmarEmail").style.borderColor =
              "#ef4444";
          } else {
            document.getElementById("confirmarEmail").style.borderColor =
              "#e5e7eb";
          }
        });

      document
        .getElementById("confirmarSenha")
        .addEventListener("input", () => {
          const senha = document.getElementById("senha").value;
          const confirmSenha = document.getElementById("confirmarSenha").value;
          if (senha && confirmSenha && senha !== confirmSenha) {
            document.getElementById("confirmarSenha").style.borderColor =
              "#ef4444";
          } else {
            document.getElementById("confirmarSenha").style.borderColor =
              "#e5e7eb";
          }
        });

      // Form Submit
      document
        .getElementById("form-cadastro")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const nome = document.getElementById("nome").value.trim();
          const email = document.getElementById("email").value.trim();
          const confirmarEmail = document
            .getElementById("confirmarEmail")
            .value.trim();
          const senha = document.getElementById("senha").value;
          const confirmarSenha =
            document.getElementById("confirmarSenha").value;

          // Validações frontend
          if (!nome || nome.length < 2) {
            showAlert("Nome deve ter pelo menos 2 caracteres", "error");
            return;
          }
          if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showAlert("Email inválido", "error");
            return;
          }
          if (email !== confirmarEmail) {
            showAlert("Emails não coincidem", "error");
            return;
          }
          if (senha.length < 8) {
            showAlert("Senha deve ter pelo menos 8 caracteres", "error");
            return;
          }
          if (senha !== confirmarSenha) {
            showAlert("Senhas não coincidem", "error");
            return;
          }

          // Loading
          const btn = e.target.querySelector('button[type="submit"]');
          const originalText = btn.textContent;
          btn.textContent = "Criando conta...";
          btn.disabled = true;

          try {
            const response = await fetch(`${API_URL}/usuario/cadastrar`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                nome,
                email,
                confirmarEmail,
                senha,
                confirmarSenha,
              }),
            });

            const result = await response.json();

            if (result.success) {
              showAlert(
                "✅ Cadastro realizado com sucesso!<br>Redirecionando para login...",
                "success",
              );

              // Salva email para auto-fill no login
              localStorage.setItem("cadastro-email", email);

              // Redireciona conforme backend
              setTimeout(() => {
                window.location.href = result.redirectTo || "/usuario/login";
              }, 2500);
            } else {
              showAlert(result.error || "Erro no cadastro", "error");
            }
          } catch (error) {
            console.error("❌ Erro cadastro:", error);
            showAlert("Erro de conexão. Tente novamente.", "error");
          } finally {
            btn.textContent = originalText;
            btn.disabled = false;
          }
        });

      console.log("✅ Cadastro page carregada!");
    </script>
  </body>
</html>
