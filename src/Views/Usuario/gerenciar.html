<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciar Usuários – Blog de Notícias</title>
    <link rel="stylesheet" href="../_shared/css/base.css" />
    <link rel="stylesheet" href="../_shared/css/components.css" />
    <style>
      .admin-page {
        max-width: 1000px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      /* Filtros */
      .filtros-card {
        background: var(--cor-branco);
        border-radius: var(--raio);
        padding: 1.25rem;
        box-shadow: var(--sombra);
        margin-bottom: 1.5rem;
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        align-items: flex-end;
      }

      .filtros-card .campo {
        flex: 1;
        min-width: 160px;
        margin-bottom: 0;
      }

      .filtros-card .campo label {
        font-size: 0.8rem;
      }

      /* Tabela */
      .usuarios-card {
        background: var(--cor-branco);
        border-radius: var(--raio);
        box-shadow: var(--sombra);
        overflow: hidden;
      }

      .usuarios-card table {
        width: 100%;
        border-collapse: collapse;
      }

      .usuarios-card th {
        background: var(--cor-fundo);
        padding: 0.75rem 1rem;
        text-align: left;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--cor-texto-suave);
        border-bottom: 1px solid var(--cor-borda);
      }

      .usuarios-card td {
        padding: 0.875rem 1rem;
        border-bottom: 1px solid var(--cor-borda);
        font-size: 0.875rem;
        vertical-align: middle;
      }

      .usuarios-card tr:last-child td {
        border-bottom: none;
      }

      .usuarios-card tr:hover td {
        background: #f9fafb;
      }

      /* Avatar inline */
      .usuario-row {
        display: flex;
        align-items: center;
        gap: 0.625rem;
      }

      .mini-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--cor-primaria);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        font-weight: 700;
        flex-shrink: 0;
      }

      .usuario-email {
        font-size: 0.78rem;
        color: var(--cor-texto-suave);
      }

      /* Pills de perfil e status */
      .pill {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
      }

      .pill-admin {
        background: #ede9fe;
        color: #5b21b6;
      }
      .pill-editor {
        background: #dbeafe;
        color: #1e40af;
      }
      .pill-autor {
        background: #e0f2fe;
        color: #0369a1;
      }
      .pill-leitor {
        background: #f3f4f6;
        color: #374151;
      }

      .pill-ativo {
        background: #dcfce7;
        color: #166534;
      }
      .pill-inativo {
        background: #f3f4f6;
        color: #6b7280;
      }
      .pill-bloqueado {
        background: #fee2e2;
        color: #991b1b;
      }

      .sem-usuarios {
        text-align: center;
        padding: 2.5rem;
        color: var(--cor-texto-suave);
      }

      .contador {
        font-size: 0.82rem;
        color: var(--cor-texto-suave);
        margin-bottom: 0.75rem;
      }

      /* Modal */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 200;
        align-items: center;
        justify-content: center;
      }

      .modal-overlay.aberto {
        display: flex;
      }

      .modal {
        background: var(--cor-branco);
        border-radius: var(--raio);
        padding: 1.5rem;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.25rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--cor-borda);
      }

      .modal-header h2 {
        font-size: 1rem;
      }

      .modal-fechar {
        background: none;
        border: none;
        font-size: 1.25rem;
        cursor: pointer;
        color: var(--cor-texto-suave);
      }

      .modal-usuario-info {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
        padding: 0.75rem;
        background: var(--cor-fundo);
        border-radius: var(--raio);
      }

      .modal-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--cor-primaria);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .acoes-tabela {
        display: flex;
        gap: 0.5rem;
      }

      @media (max-width: 640px) {
        .usuarios-card th:nth-child(4),
        .usuarios-card td:nth-child(4),
        .usuarios-card th:nth-child(5),
        .usuarios-card td:nth-child(5) {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar__inner">
        <a href="../Home/index.html" class="navbar__logo"
          >📰 Blog de Notícias</a
        >
        <div class="navbar__acoes">
          <a href="../Categorias/index.html" class="btn btn-secundario btn-sm"
            >⚙️ Categorias</a
          >
          <a
            href="../Usuario/minhasPostagens.html"
            class="btn btn-secundario btn-sm"
            >Minhas Postagens</a
          >
          <button class="btn btn-secundario btn-sm" id="btn-logout">
            Sair
          </button>
        </div>
      </div>
    </nav>

    <div class="admin-page">
      <div class="admin-header">
        <h1 style="font-size: 1.5rem">Gerenciar Usuários</h1>
        <span class="badge pill-admin">admin</span>
      </div>

      <div
        class="alerta alerta-erro"
        id="alerta-erro"
        style="display: none"
      ></div>
      <div
        class="alerta alerta-sucesso"
        id="alerta-sucesso"
        style="display: none"
      ></div>

      <!-- Filtros -->
      <div class="filtros-card">
        <div class="campo">
          <label for="filtro-busca">Buscar por nome ou e-mail</label>
          <input
            type="text"
            id="filtro-busca"
            placeholder="Digite para filtrar..."
          />
        </div>
        <div class="campo">
          <label for="filtro-perfil">Perfil</label>
          <select id="filtro-perfil">
            <option value="">Todos</option>
            <option value="admin">Administrador</option>
            <option value="editor">Editor</option>
            <option value="autor">Autor</option>
            <option value="leitor">Leitor</option>
          </select>
        </div>
        <div class="campo">
          <label for="filtro-status">Status</label>
          <select id="filtro-status">
            <option value="">Todos</option>
            <option value="ativo">Ativo</option>
            <option value="inativo">Inativo</option>
            <option value="bloqueado">Bloqueado</option>
          </select>
        </div>
        <button
          class="btn btn-secundario btn-sm"
          id="btn-limpar"
          style="width: auto; padding: 0.625rem 1rem; margin-bottom: 0"
        >
          Limpar
        </button>
      </div>

      <p class="contador" id="contador">Carregando...</p>

      <!-- Tabela -->
      <div class="usuarios-card">
        <table>
          <thead>
            <tr>
              <th>Usuário</th>
              <th>Perfil</th>
              <th>Status</th>
              <th>Cadastro</th>
              <th>Último acesso</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-usuarios">
            <tr>
              <td colspan="6"><div class="sem-usuarios">Carregando...</div></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Modal de edição -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2>Editar Usuário</h2>
          <button class="modal-fechar" id="modal-fechar">✕</button>
        </div>

        <div class="modal-usuario-info">
          <div class="modal-avatar" id="modal-avatar">?</div>
          <div>
            <div style="font-weight: 600" id="modal-nome">—</div>
            <div
              style="font-size: 0.8rem; color: var(--cor-texto-suave)"
              id="modal-email"
            >
              —
            </div>
          </div>
        </div>

        <div
          class="alerta alerta-erro"
          id="modal-erro"
          style="display: none"
        ></div>

        <div class="campo">
          <label for="edit-perfil">Perfil de acesso</label>
          <select id="edit-perfil">
            <option value="admin">Administrador</option>
            <option value="editor">Editor</option>
            <option value="autor">Autor</option>
            <option value="leitor">Leitor</option>
          </select>
        </div>

        <div class="campo">
          <label for="edit-status">Status da conta</label>
          <select id="edit-status">
            <option value="ativo">Ativo</option>
            <option value="inativo">Inativo</option>
            <option value="bloqueado">Bloqueado</option>
          </select>
        </div>

        <div style="display: flex; gap: 0.75rem; margin-top: 1rem">
          <button class="btn btn-primario" id="btn-salvar" style="flex: 1">
            Salvar
          </button>
          <button class="btn btn-secundario" id="btn-cancelar" style="flex: 1">
            Cancelar
          </button>
        </div>
      </div>
    </div>

    <footer class="footer">
      © 2026 Blog de Notícias. Todos os direitos reservados.
    </footer>

    <script src="../_shared/js/utils.js"></script>
    <script type="module">
      // ─── VERIFICA AUTENTICAÇÃO ───
      const usuarioLogado = getUsuarioLogado();
      if (!usuarioLogado || usuarioLogado.nivelAcesso !== "admin") {
        showAlert("Acesso exclusivo de administrador", "error");
        setTimeout(() => (window.location.href = "../Home/index.html"), 2000);
        throw new Error("Acesso negado");
      }

      // ─── VARIÁVEIS GLOBAIS ───
      let usuarios = [];
      let usuarioEmEdicao = null;
      const API_URL = "/api"; // Ajustar conforme sua configuração

      // ─── CARREGAR USUÁRIOS DO BANCO ───
      async function carregarUsuarios(filtros = {}) {
        try {
          const params = new URLSearchParams({
            pagina: 1,
            limite: 50,
            ...filtros,
          });

          document.getElementById("tabela-usuarios").innerHTML =
            '<tr><td colspan="6"><div class="sem-usuarios">Carregando...</div></td></tr>';

          const response = await fetch(`${API_URL}/usuarios?${params}`, {
            headers: getAuthHeader(),
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const result = await response.json();
          if (result.success) {
            usuarios = result.data;
            renderizar();
          } else {
            throw new Error(result.error);
          }
        } catch (error) {
          console.error("Erro:", error);
          document.getElementById("tabela-usuarios").innerHTML = `
            <tr><td colspan="6" style="text-align:center;padding:3rem;color:var(--cor-erro);">
              ❌ Erro ao carregar usuários<br>
              <button class="btn btn-primario" onclick="carregarUsuarios()" style="margin-top:1rem;">Tentar novamente</button>
            </td></tr>
          `;
          showAlert("Erro ao carregar usuários", "error");
        }
      }

      // ─── FILTROS ───
      function obterFiltrados() {
        const busca = document
          .getElementById("filtro-busca")
          .value.toLowerCase()
          .trim();
        const perfil = document.getElementById("filtro-perfil").value;
        const status = document.getElementById("filtro-status").value;

        return usuarios.filter((u) => {
          const matchBusca =
            !busca ||
            u.nomeCompleto.toLowerCase().includes(busca) ||
            u.email.toLowerCase().includes(busca);
          const matchPerfil = !perfil || u.nivelAcesso === perfil;
          const matchStatus = !status || u.status === status;
          return matchBusca && matchPerfil && matchStatus;
        });
      }

      // ─── FORMATAÇÃO ───
      function formatarData(dataStr) {
        if (!dataStr) return "—";
        return new Date(dataStr).toLocaleDateString("pt-BR");
      }

      function pillPerfil(perfil) {
        const classes = {
          admin: "pill-admin",
          editor: "pill-editor",
          autor: "pill-autor",
          leitor: "pill-leitor",
        };
        return `<span class="pill ${classes[perfil] || "pill-leitor"}">${perfil}</span>`;
      }

      function pillStatus(status) {
        const classes = {
          ativo: "pill-ativo",
          inativo: "pill-inativo",
          bloqueado: "pill-bloqueado",
        };
        return `<span class="pill ${classes[status] || "pill-inativo"}">${status}</span>`;
      }

      // ─── RENDERIZAR ───
      function renderizar() {
        const lista = obterFiltrados();
        const tbody = document.getElementById("tabela-usuarios");
        const contador = document.getElementById("contador");

        contador.textContent = `${lista.length} usuário(s) encontrado(s)`;

        if (lista.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6"><div class="sem-usuarios">Nenhum usuário encontrado.</div></td></tr>`;
          return;
        }

        tbody.innerHTML = lista
          .map(
            (u) => `
            <tr>
              <td>
                <div class="usuario-row">
                  <div class="mini-avatar">${u.nomeCompleto.charAt(0).toUpperCase()}</div>
                  <div>
                    <div style="font-weight:500;">${u.nomeCompleto}</div>
                    <div class="usuario-email">${u.email}</div>
                  </div>
                </div>
              </td>
              <td>${pillPerfil(u.nivelAcesso)}</td>
              <td>${pillStatus(u.status)}</td>
              <td>${formatarData(u.dataCadastro)}</td>
              <td>${formatarData(u.ultimoAcesso)}</td>
              <td>
                <div class="acoes-tabela">
                  <button class="btn btn-secundario btn-sm" onclick="abrirEdicao(${u.idUsuario})">✏️ Editar</button>
                </div>
              </td>
            </tr>
        `,
          )
          .join("");
      }

      // ─── MODAL EDIÇÃO ───
      window.abrirEdicao = async function (id) {
        try {
          const response = await fetch(`${API_URL}/usuarios/${id}`, {
            headers: getAuthHeader(),
          });
          const result = await response.json();

          if (result.success) {
            usuarioEmEdicao = result.data;
            document.getElementById("modal-avatar").textContent =
              usuarioEmEdicao.nomeCompleto.charAt(0).toUpperCase();
            document.getElementById("modal-nome").textContent =
              usuarioEmEdicao.nomeCompleto;
            document.getElementById("modal-email").textContent =
              usuarioEmEdicao.email;
            document.getElementById("edit-perfil").value =
              usuarioEmEdicao.nivelAcesso;
            document.getElementById("edit-status").value =
              usuarioEmEdicao.status;
            document.getElementById("modal-erro").style.display = "none";

            document.getElementById("modal-overlay").classList.add("aberto");
          }
        } catch (error) {
          showAlert("Erro ao carregar usuário", "error");
        }
      };

      // ─── SALVAR EDIÇÃO ───
      document
        .getElementById("btn-salvar")
        .addEventListener("click", async () => {
          if (!usuarioEmEdicao) return;

          const novoPerfil = document.getElementById("edit-perfil").value;
          const novoStatus = document.getElementById("edit-status").value;
          const erroEl = document.getElementById("modal-erro");

          const dados = {
            nomeCompleto: usuarioEmEdicao.nomeCompleto,
            nivelAcesso: novoPerfil,
            status: novoStatus,
          };

          try {
            const response = await fetch(
              `${API_URL}/usuarios/${usuarioEmEdicao.idUsuario}`,
              {
                method: "PUT",
                headers: {
                  "Content-Type": "application/json",
                  ...getAuthHeader(),
                },
                body: JSON.stringify(dados),
              },
            );

            const result = await response.json();

            if (result.success) {
              exibirSucesso(`Usuário "${dados.nomeCompleto}" atualizado!`);
              fecharModal();
              await carregarUsuarios();
            } else {
              erroEl.textContent = result.error;
              erroEl.style.display = "block";
            }
          } catch (error) {
            erroEl.textContent = "Erro ao salvar";
            erroEl.style.display = "block";
          }
        });

      function fecharModal() {
        document.getElementById("modal-overlay").classList.remove("aberto");
        usuarioEmEdicao = null;
      }

      // ─── EVENTOS MODAL ───
      document
        .getElementById("modal-fechar")
        .addEventListener("click", fecharModal);
      document
        .getElementById("btn-cancelar")
        .addEventListener("click", fecharModal);
      document
        .getElementById("modal-overlay")
        .addEventListener("click", (e) => {
          if (e.target === document.getElementById("modal-overlay"))
            fecharModal();
        });

      // ─── FILTROS LISTENERS ───
      ["filtro-busca", "filtro-perfil", "filtro-status"].forEach((id) => {
        document.getElementById(id).addEventListener("input", renderizar);
      });

      document.getElementById("btn-limpar").addEventListener("click", () => {
        document.getElementById("filtro-busca").value = "";
        document.getElementById("filtro-perfil").value = "";
        document.getElementById("filtro-status").value = "";
        renderizar();
      });

      // ─── LOGOUT ───
      document.getElementById("btn-logout").addEventListener("click", logout);

      // ─── ALERTAS ───
      function exibirSucesso(msg) {
        const el = document.getElementById("alerta-sucesso");
        el.textContent = msg;
        el.style.display = "block";
        setTimeout(() => (el.style.display = "none"), 3000);
      }

      // ─── INICIALIZAÇÃO ───
      carregarUsuarios();
    </script>
  </body>
</html>
