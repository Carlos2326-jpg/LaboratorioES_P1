<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minhas Postagens - Blog de Notícias</title>
    <link rel="stylesheet" href="../_shared/css/base.css" />
    <link rel="stylesheet" href="../_shared/css/components.css" />
    <style>
      .dashboard-container {
        max-width: 1200px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      .postagens-table {
        width: 100%;
        background: var(--cor-branco);
        border-radius: var(--raio);
        overflow: hidden;
        box-shadow: var(--sombra);
      }

      .postagens-table th {
        background: var(--cor-fundo);
        padding: 1rem;
        text-align: left;
      }

      .postagens-table td {
        padding: 1rem;
        border-top: 1px solid var(--cor-borda);
      }

      .status-pill {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .status-publicado {
        background: #dcfce7;
        color: #166534;
      }
      .status-rascunho {
        background: #fef3c7;
        color: #92400e;
      }
      .status-agendado {
        background: #dbeafe;
        color: #1e40af;
      }

      .acoes {
        display: flex;
        gap: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div id="header-container"></div>

    <main class="dashboard-container">
      <div class="dashboard-header">
        <h1>Minhas Postagens</h1>
        <a href="/noticia/criar" class="btn btn-primario">+ Nova Postagem</a>
      </div>

      <div class="postagens-table">
        <table>
          <thead>
            <tr>
              <th>Título</th>
              <th>Status</th>
              <th>Data</th>
              <th>Visualizações</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-postagens">
            <tr>
              <td colspan="5" class="loading-text">Carregando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <div id="footer-container"></div>

    <script src="/_shared/js/utils.js"></script>
    <script src="/Usuario/js/minhasPostagens.js" type="module"></script>
  </body>
</html>
