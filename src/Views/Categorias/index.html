<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciar Categorias – Blog de Notícias</title>
    <link rel="stylesheet" href="../_shared/css/base.css" />
    <link rel="stylesheet" href="../_shared/css/components.css" />
    <style>
      .admin-page {
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      /* Formulário de nova categoria */
      .form-card {
        background: var(--cor-branco);
        border-radius: var(--raio);
        padding: 1.5rem;
        box-shadow: var(--sombra);
        margin-bottom: 1.5rem;
      }

      .form-card h2 {
        font-size: 1rem;
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid var(--cor-primaria);
      }

      .form-inline {
        display: flex;
        gap: 0.75rem;
        align-items: flex-end;
        flex-wrap: wrap;
      }

      .form-inline .campo {
        flex: 1;
        min-width: 160px;
        margin-bottom: 0;
      }

      /* Tabela de categorias */
      .categorias-card {
        background: var(--cor-branco);
        border-radius: var(--raio);
        box-shadow: var(--sombra);
        overflow: hidden;
      }

      .categorias-card table {
        width: 100%;
        border-collapse: collapse;
      }

      .categorias-card th {
        background: var(--cor-fundo);
        padding: 0.75rem 1rem;
        text-align: left;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--cor-texto-suave);
        border-bottom: 1px solid var(--cor-borda);
      }

      .categorias-card td {
        padding: 0.875rem 1rem;
        border-bottom: 1px solid var(--cor-borda);
        font-size: 0.9rem;
        vertical-align: middle;
      }

      .categorias-card tr:last-child td {
        border-bottom: none;
      }

      .categorias-card tr:hover td {
        background: #f9fafb;
      }

      .status-ativo {
        color: var(--cor-sucesso);
        font-weight: 600;
        font-size: 0.8rem;
      }
      .status-inativo {
        color: var(--cor-texto-suave);
        font-weight: 600;
        font-size: 0.8rem;
      }

      .acoes-tabela {
        display: flex;
        gap: 0.5rem;
      }

      /* Modal de edição */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 200;
        align-items: center;
        justify-content: center;
      }

      .modal-overlay.aberto {
        display: flex;
      }

      .modal {
        background: var(--cor-branco);
        border-radius: var(--raio);
        padding: 1.5rem;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.25rem;
      }

      .modal-header h2 {
        font-size: 1rem;
      }

      .modal-fechar {
        background: none;
        border: none;
        font-size: 1.25rem;
        cursor: pointer;
        color: var(--cor-texto-suave);
        line-height: 1;
      }

      .sem-categorias {
        text-align: center;
        padding: 2.5rem;
        color: var(--cor-texto-suave);
      }

      /* Ocultar ações se não for admin */
      .somente-admin {
        display: none !important;
      }

      @media (max-width: 640px) {
        .categorias-card th:nth-child(3),
        .categorias-card td:nth-child(3) {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar__inner">
        <a href="../Home/index.html" class="navbar__logo"
          >📰 Blog de Notícias</a
        >
        <div class="navbar__acoes">
          <a href="../Usuario/gerenciar.html" class="btn btn-secundario btn-sm"
            >👥 Usuários</a
          >
          <a
            href="../Usuario/minhasPostagens.html"
            class="btn btn-secundario btn-sm"
            >← Minhas Postagens</a
          >
          <button class="btn btn-secundario btn-sm" id="btn-logout">
            Sair
          </button>
        </div>
      </div>
    </nav>

    <div class="admin-page">
      <div class="admin-header">
        <h1 style="font-size: 1.5rem">Gerenciar Categorias</h1>
        <span id="nivel-badge" class="badge"></span>
      </div>

      <div
        class="alerta alerta-erro"
        id="alerta-erro"
        style="display: none"
      ></div>
      <div
        class="alerta alerta-sucesso"
        id="alerta-sucesso"
        style="display: none"
      ></div>

      <!-- Formulário nova categoria — visível só pra admin -->
      <div class="form-card somente-admin" id="form-nova">
        <h2>Nova Categoria</h2>
        <div class="form-inline">
          <div class="campo">
            <label for="nome-categoria">Nome</label>
            <input type="text" id="nome-categoria" placeholder="Ex: Economia" />
            <span class="erro" id="erro-nome"></span>
          </div>
          <div class="campo">
            <label for="slug-categoria">Slug</label>
            <input type="text" id="slug-categoria" placeholder="ex: economia" />
            <span class="erro" id="erro-slug"></span>
          </div>
          <div class="campo">
            <label for="desc-categoria">Descrição</label>
            <input type="text" id="desc-categoria" placeholder="Opcional" />
          </div>
          <button
            class="btn btn-primario btn-sm"
            id="btn-criar"
            style="width: auto; padding: 0.625rem 1.25rem; margin-bottom: 1rem"
          >
            + Adicionar
          </button>
        </div>
      </div>

      <!-- Tabela -->
      <div class="categorias-card">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Slug</th>
              <th>Descrição</th>
              <th>Status</th>
              <th class="somente-admin">Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-categorias">
            <tr>
              <td colspan="5">
                <div class="sem-categorias">Carregando...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Modal de edição -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2>Editar Categoria</h2>
          <button class="modal-fechar" id="modal-fechar">✕</button>
        </div>
        <div class="campo">
          <label for="edit-nome">Nome</label>
          <input type="text" id="edit-nome" />
          <span class="erro" id="edit-erro-nome"></span>
        </div>
        <div class="campo">
          <label for="edit-slug">Slug</label>
          <input type="text" id="edit-slug" />
        </div>
        <div class="campo">
          <label for="edit-desc">Descrição</label>
          <input type="text" id="edit-desc" />
        </div>
        <div class="campo">
          <label for="edit-status">Status</label>
          <select id="edit-status">
            <option value="ativo">Ativo</option>
            <option value="inativo">Inativo</option>
          </select>
        </div>
        <div style="display: flex; gap: 0.75rem; margin-top: 1rem">
          <button
            class="btn btn-primario"
            id="btn-salvar-edicao"
            style="flex: 1"
          >
            Salvar
          </button>
          <button class="btn btn-secundario" id="btn-cancelar" style="flex: 1">
            Cancelar
          </button>
        </div>
      </div>
    </div>

    <footer class="footer">
      © 2026 Blog de Notícias. Todos os direitos reservados.
    </footer>

    <script src="../_shared/js/utils.js"></script>
    <script type="module">
      // ─── VERIFICA AUTENTICAÇÃO ───
      const usuarioLogado = getUsuarioLogado();
      if (
        !usuarioLogado ||
        !["admin", "editor"].includes(usuarioLogado.nivelAcesso)
      ) {
        showAlert("Acesso restrito a administradores e editores", "error");
        setTimeout(() => (window.location.href = "../Home/index.html"), 2000);
        throw new Error("Acesso negado");
      }

      const isAdmin = usuarioLogado.nivelAcesso === "admin";
      const API_URL = "/api"; // Ajustar conforme configuração

      // ─── MOSTRAR ELEMENTOS ADMIN ───
      if (isAdmin) {
        document.querySelectorAll(".somente-admin").forEach((el) => {
          el.style.setProperty("display", "block", "important");
        });
      }

      // Badge de nível
      const badge = document.getElementById("nivel-badge");
      badge.textContent = usuarioLogado.nivelAcesso;
      badge.className = `badge pill-${usuarioLogado.nivelAcesso}`;

      // ─── VARIÁVEIS GLOBAIS ───
      let categorias = [];
      let categoriaEmEdicao = null;

      // ─── CARREGAR CATEGORIAS ───
      async function carregarCategorias() {
        try {
          document.getElementById("tabela-categorias").innerHTML =
            '<tr><td colspan="5"><div class="sem-categorias">Carregando...</div></td></tr>';

          const response = await fetch(`${API_URL}/categorias`, {
            headers: getAuthHeader(),
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const result = await response.json();
          if (result.success) {
            categorias = result.data;
            renderizar();
          } else {
            throw new Error(result.error);
          }
        } catch (error) {
          console.error("Erro:", error);
          document.getElementById("tabela-categorias").innerHTML = `
            <tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--cor-erro);">
              ❌ Erro ao carregar categorias<br>
              <button class="btn btn-primario" onclick="carregarCategorias()" style="margin-top:1rem;">Tentar novamente</button>
            </td></tr>
          `;
          exibirErro("Erro ao carregar categorias");
        }
      }

      // ─── RENDERIZAR ───
      function renderizar() {
        const tbody = document.getElementById("tabela-categorias");

        if (categorias.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5"><div class="sem-categorias">Nenhuma categoria encontrada.</div></td></tr>`;
          return;
        }

        tbody.innerHTML = categorias
          .map(
            (cat) => `
            <tr>
              <td><strong>${cat.nome}</strong></td>
              <td><code style="font-size:0.8rem;color:var(--cor-texto-suave);">${cat.slug}</code></td>
              <td style="color:var(--cor-texto-suave);font-size:0.85rem;">${cat.descricao || "—"}</td>
              <td>
                <span class="status-${cat.status}">
                  ${cat.status === "ativo" ? "● Ativo" : "○ Inativo"}
                </span>
              </td>
              ${
                isAdmin
                  ? `
              <td>
                <div class="acoes-tabela">
                  <button class="btn btn-secundario btn-sm" onclick="abrirEdicao(${cat.idCategoria})">✏️ Editar</button>
                  <button class="btn btn-perigo btn-sm" onclick="excluir(${cat.idCategoria})">🗑️</button>
                </div>
              </td>`
                  : "<td></td>"
              }
            </tr>
        `,
          )
          .join("");
      }

      // ─── GERAR SLUG AUTOMÁTICO ───
      function gerarSlug(nome) {
        return nome
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "");
      }

      document
        .getElementById("nome-categoria")
        .addEventListener("input", (e) => {
          const slug = gerarSlug(e.target.value);
          document.getElementById("slug-categoria").value = slug;
        });

      // ─── CRIAR CATEGORIA ───
      document
        .getElementById("btn-criar")
        .addEventListener("click", async () => {
          const nome = document.getElementById("nome-categoria").value.trim();
          const slug = document.getElementById("slug-categoria").value.trim();
          const desc = document.getElementById("desc-categoria").value.trim();

          document.getElementById("erro-nome").textContent = "";
          document.getElementById("erro-slug").textContent = "";

          if (!nome) {
            document.getElementById("erro-nome").textContent =
              "Nome obrigatório";
            return;
          }
          if (!slug) {
            document.getElementById("erro-slug").textContent =
              "Slug obrigatório";
            return;
          }

          try {
            const response = await fetch(`${API_URL}/categorias`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                ...getAuthHeader(),
              },
              body: JSON.stringify({ nome, slug, descricao: desc }),
            });

            const result = await response.json();

            if (result.success) {
              exibirSucesso(`Categoria "${nome}" criada!`);
              limparFormulario();
              await carregarCategorias();
            } else {
              document.getElementById("erro-slug").textContent =
                result.error || "Erro ao criar";
            }
          } catch (error) {
            exibirErro("Erro de conexão ao criar categoria");
          }
        });

      // ─── EDITAR ───
      window.abrirEdicao = async function (id) {
        try {
          const response = await fetch(`${API_URL}/categorias/${id}`, {
            headers: getAuthHeader(),
          });
          const result = await response.json();

          if (result.success) {
            categoriaEmEdicao = result.data;
            document.getElementById("edit-nome").value = categoriaEmEdicao.nome;
            document.getElementById("edit-slug").value = categoriaEmEdicao.slug;
            document.getElementById("edit-desc").value =
              categoriaEmEdicao.descricao || "";
            document.getElementById("edit-status").value =
              categoriaEmEdicao.status;
            document.getElementById("edit-erro-nome").textContent = "";

            document.getElementById("modal-overlay").classList.add("aberto");
          }
        } catch (error) {
          exibirErro("Erro ao carregar categoria");
        }
      };

      document
        .getElementById("btn-salvar-edicao")
        .addEventListener("click", async () => {
          if (!categoriaEmEdicao) return;

          const nome = document.getElementById("edit-nome").value.trim();
          document.getElementById("edit-erro-nome").textContent = "";

          if (!nome) {
            document.getElementById("edit-erro-nome").textContent =
              "Nome obrigatório";
            return;
          }

          const dados = {
            nome,
            slug: document.getElementById("edit-slug").value.trim(),
            descricao: document.getElementById("edit-desc").value.trim(),
            status: document.getElementById("edit-status").value,
          };

          try {
            const response = await fetch(
              `${API_URL}/categorias/${categoriaEmEdicao.idCategoria}`,
              {
                method: "PUT",
                headers: {
                  "Content-Type": "application/json",
                  ...getAuthHeader(),
                },
                body: JSON.stringify(dados),
              },
            );

            const result = await response.json();

            if (result.success) {
              exibirSucesso(`Categoria "${nome}" atualizada!`);
              fecharModal();
              await carregarCategorias();
            } else {
              document.getElementById("edit-erro-nome").textContent =
                result.error || "Erro ao salvar";
            }
          } catch (error) {
            exibirErro("Erro de conexão ao salvar");
          }
        });

      // ─── EXCLUIR ───
      window.excluir = async function (id) {
        const categoria = categorias.find((c) => c.idCategoria === id);
        if (!confirm(`Excluir a categoria "${categoria?.nome || "ID " + id}"?`))
          return;

        try {
          const response = await fetch(`${API_URL}/categorias/${id}`, {
            method: "DELETE",
            headers: getAuthHeader(),
          });

          const result = await response.json();

          if (result.success) {
            exibirSucesso(`Categoria "${categoria?.nome}" removida!`);
            await carregarCategorias();
          } else {
            exibirErro(result.error || "Erro ao excluir");
          }
        } catch (error) {
          exibirErro("Erro de conexão ao excluir");
        }
      };

      // ─── UTILITÁRIOS ───
      function limparFormulario() {
        document.getElementById("nome-categoria").value = "";
        document.getElementById("slug-categoria").value = "";
        document.getElementById("desc-categoria").value = "";
        document.getElementById("erro-nome").textContent = "";
        document.getElementById("erro-slug").textContent = "";
      }

      function fecharModal() {
        document.getElementById("modal-overlay").classList.remove("aberto");
        categoriaEmEdicao = null;
      }

      function exibirSucesso(msg) {
        const el = document.getElementById("alerta-sucesso");
        el.textContent = msg;
        el.style.display = "block";
        setTimeout(() => (el.style.display = "none"), 3000);
      }

      function exibirErro(msg) {
        const el = document.getElementById("alerta-erro");
        el.textContent = msg;
        el.style.display = "block";
        setTimeout(() => (el.style.display = "none"), 5000);
      }

      // ─── EVENTOS MODAL ───
      document
        .getElementById("modal-fechar")
        .addEventListener("click", fecharModal);
      document
        .getElementById("btn-cancelar")
        .addEventListener("click", fecharModal);
      document
        .getElementById("modal-overlay")
        .addEventListener("click", (e) => {
          if (e.target === document.getElementById("modal-overlay"))
            fecharModal();
        });

      // ─── LOGOUT ───
      document.getElementById("btn-logout").addEventListener("click", logout);

      // ─── INICIALIZAÇÃO ───
      carregarCategorias();
    </script>
  </body>
</html>
