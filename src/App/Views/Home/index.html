<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog de Notícias</title>
    <link rel="stylesheet" href="../_shared/css/base.css" />
    <link rel="stylesheet" href="../_shared/css/components.css" />
    <style>
      .home-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
        margin: 2rem 0;
      }
      .filtros {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin: 1.5rem 0 0.5rem;
      }
      .filtro-btn {
        padding: 0.375rem 0.875rem;
        border: 1px solid var(--cor-borda);
        border-radius: 999px;
        background: var(--cor-branco);
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .filtro-btn.ativo,
      .filtro-btn:hover {
        background: var(--cor-primaria);
        color: var(--cor-branco);
        border-color: var(--cor-primaria);
      }
      .resultado-busca {
        font-size: 0.9rem;
        color: var(--cor-texto-suave);
        margin-bottom: 1rem;
      }
      .sem-resultados {
        text-align: center;
        padding: 3rem;
        color: var(--cor-texto-suave);
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar__inner">
        <a href="index.html" class="navbar__logo">📰 Blog de Notícias</a>
        <div class="navbar__busca">
          <input
            type="text"
            id="campo-busca"
            placeholder="Buscar notícias..."
          />
          <button class="btn btn-primario btn-sm" id="btn-buscar">
            Buscar
          </button>
        </div>
        <div class="navbar__acoes">
          <a href="../Noticia/criar.html" class="btn btn-secundario btn-sm"
            >+ Nova Postagem</a
          >
          <a href="../Usuario/index.html" class="btn btn-secundario btn-sm"
            >Entrar</a
          >
          <a href="../Usuario/cadastro.html" class="btn btn-primario btn-sm"
            >Cadastrar</a
          >
        </div>
      </div>
    </nav>

    <main class="container">
      <div class="filtros" id="filtros-categoria">
        <button class="filtro-btn ativo" data-categoria="">Todas</button>
        <button class="filtro-btn" data-categoria="Política">Política</button>
        <button class="filtro-btn" data-categoria="Esportes">Esportes</button>
        <button class="filtro-btn" data-categoria="Tecnologia">
          Tecnologia
        </button>
        <button class="filtro-btn" data-categoria="Saúde">Saúde</button>
      </div>

      <p class="resultado-busca" id="resultado-busca" style="display: none"></p>

      <div class="home-grid" id="grid-noticias"></div>

      <div class="sem-resultados" id="sem-resultados" style="display: none">
        Nenhuma notícia encontrada com os filtros selecionados.
      </div>

      <div class="paginacao" id="paginacao"></div>
    </main>

    <footer class="footer">
      © 2026 Blog de Notícias. Todos os direitos reservados.
    </footer>

    <script src="js/home.js" type="module"></script>
  </body>
</html>
