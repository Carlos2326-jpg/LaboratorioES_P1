<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro – Blog de Notícias</title>
    <link rel="stylesheet" href="../_shared/css/base.css" />
    <link rel="stylesheet" href="../_shared/css/components.css" />
  </head>
  <body>
    <main class="auth-page">
      <article class="auth-card">
        <h1>Criar conta</h1>
        <p class="subtitulo">Preencha os dados para se cadastrar</p>

        <div
          class="alerta alerta-erro"
          id="alerta-global"
          style="display: none"
        ></div>

        <form id="form-cadastro" novalidate>
          <div class="campo">
            <label for="nome">Nome completo</label>
            <input
              type="text"
              id="nome"
              name="nome"
              placeholder="Seu nome completo"
              required
            />
            <span class="erro" id="erro-nome"></span>
          </div>

          <div class="campo">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com"
              required
            />
            <span class="erro" id="erro-email"></span>
          </div>

          <div class="campo">
            <label for="confirmar-email">Confirmar e-mail</label>
            <input
              type="email"
              id="confirmar-email"
              name="confirmarEmail"
              placeholder="Repita o e-mail"
              required
            />
            <span class="erro" id="erro-confirmar-email"></span>
          </div>

          <div class="campo">
            <label for="senha">Senha</label>
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="Mínimo 8 caracteres"
              required
            />
            <span class="erro" id="erro-senha"></span>
          </div>

          <div class="campo">
            <label for="confirmar-senha">Confirmar senha</label>
            <input
              type="password"
              id="confirmar-senha"
              name="confirmarSenha"
              placeholder="Repita a senha"
              required
            />
            <span class="erro" id="erro-confirmar-senha"></span>
          </div>

          <button type="submit" class="btn btn-primario">Cadastrar</button>
        </form>

        <p class="auth-link">
          Já tem conta? <a href="../Usuario/index.html">Entrar</a>
        </p>
      </article>
    </main>

    <script src="js/cadastro.js" type="module"></script>
  </body>
</html>
