<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minhas Postagens – Blog de Notícias</title>
    <link rel="stylesheet" href="../_shared/css/base.css" />
    <link rel="stylesheet" href="../_shared/css/components.css" />
    <style>
      .dashboard-page {
        max-width: 1000px;
        margin: 2rem auto;
        padding: 0 1rem;
      }

      .dashboard-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      .dashboard-header h1 {
        font-size: 1.5rem;
      }

      .postagens-tabela {
        width: 100%;
        background: var(--cor-branco);
        border-radius: var(--raio);
        box-shadow: var(--sombra);
        overflow: hidden;
      }

      .postagens-tabela table {
        width: 100%;
        border-collapse: collapse;
      }

      .postagens-tabela th {
        background: var(--cor-fundo);
        padding: 0.75rem 1rem;
        text-align: left;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--cor-texto-suave);
        border-bottom: 1px solid var(--cor-borda);
      }

      .postagens-tabela td {
        padding: 0.875rem 1rem;
        border-bottom: 1px solid var(--cor-borda);
        font-size: 0.9rem;
        vertical-align: middle;
      }

      .postagens-tabela tr:last-child td {
        border-bottom: none;
      }

      .postagens-tabela tr:hover td {
        background: #f9fafb;
      }

      .status-pill {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
      }

      .status-publicado {
        background: #dcfce7;
        color: #166534;
      }
      .status-rascunho {
        background: #fef3c7;
        color: #92400e;
      }
      .status-agendado {
        background: #dbeafe;
        color: #1e40af;
      }

      .acoes-tabela {
        display: flex;
        gap: 0.5rem;
      }

      .sem-postagens {
        text-align: center;
        padding: 3rem;
        color: var(--cor-texto-suave);
      }

      .usuario-info {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        background: var(--cor-branco);
        border-radius: var(--raio);
        padding: 1rem 1.25rem;
        margin-bottom: 1.5rem;
        box-shadow: var(--sombra);
      }

      .usuario-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--cor-primaria);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 1rem;
      }

      .usuario-nome {
        font-weight: 600;
      }

      .usuario-nivel {
        font-size: 0.8rem;
        color: var(--cor-texto-suave);
      }

      @media (max-width: 640px) {
        .postagens-tabela th:nth-child(3),
        .postagens-tabela td:nth-child(3),
        .postagens-tabela th:nth-child(4),
        .postagens-tabela td:nth-child(4) {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar__inner">
        <a href="../Home/index.html" class="navbar__logo"
          >📰 Blog de Notícias</a
        >
        <div class="navbar__acoes">
          <a href="../Noticia/criar.html" class="btn btn-primario btn-sm"
            >+ Nova Postagem</a
          >
          <button class="btn btn-secundario btn-sm" id="btn-logout">
            Sair
          </button>
        </div>
      </div>
    </nav>

    <div class="dashboard-page">
      <div class="usuario-info" id="usuario-info">
        <div class="usuario-avatar" id="usuario-avatar">?</div>
        <div>
          <div class="usuario-nome" id="usuario-nome">Carregando...</div>
          <div class="usuario-nivel" id="usuario-nivel"></div>
        </div>
      </div>

      <div class="dashboard-header">
        <h1>Minhas Postagens</h1>
        <span
          id="contador-postagens"
          style="font-size: 0.85rem; color: var(--cor-texto-suave)"
        ></span>
      </div>

      <div class="postagens-tabela">
        <table>
          <thead>
            <tr>
              <th>Título</th>
              <th>Categorias</th>
              <th>Status</th>
              <th>Data</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-body">
            <tr>
              <td colspan="5">
                <div class="sem-postagens">Carregando postagens...</div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <footer class="footer">
      © 2026 Blog de Notícias. Todos os direitos reservados.
    </footer>

    <script src="js/minhasPostagens.js" type="module"></script>
  </body>
</html>
