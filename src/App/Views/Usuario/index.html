<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Blog de Notícias</title>
    <link rel="stylesheet" href="../_shared/css/base.css" />
    <link rel="stylesheet" href="../_shared/css/components.css" />
  </head>
  <body>
    <main class="auth-page">
      <article class="auth-card">
        <h1>Blog de Notícias</h1>
        <p class="subtitulo">Entre com sua conta</p>

        <div
          class="alerta alerta-erro"
          id="alerta-global"
          style="display: none"
        ></div>

        <form id="form-login" novalidate>
          <div class="campo">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com"
              required
            />
            <span class="erro" id="erro-email"></span>
          </div>

          <div class="campo">
            <label for="senha">Senha</label>
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="Mínimo 8 caracteres"
              required
            />
            <span class="erro" id="erro-senha"></span>
          </div>

          <button type="submit" class="btn btn-primario">Entrar</button>
          <p
            style="text-align: center; margin-top: 0.75rem; font-size: 0.85rem"
          >
            <a href="redefinirSenha.html">Esqueci minha senha</a>
          </p>
        </form>

        <p class="auth-link">
          Não tem conta? <a href="../Usuario/cadastro.html">Cadastre-se</a>
        </p>
      </article>
    </main>

    <script src="js/login.js" type="module"></script>
  </body>
</html>
