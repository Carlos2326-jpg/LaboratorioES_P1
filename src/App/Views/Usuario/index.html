<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../_shared/css/base.css">
  <link rel="stylesheet" href="../_shared/css/components.css">
  <title>Login - Blog de Notícias</title>
</head>
<body>
  <body>
    <main class="login-page">
        <article class="login-card">
            <h1>Blog de Notícias</h1>
            <p>Entre com sua conta</p>

            <form id="form-login" novalidate>
                <div class="campo">
                    <label for="email">E-mail</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="seu@email.com"
                        required
                    >
                    <span class="erro" id="erro-email"></span>
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <input 
                        type="password" 
                        id="senha" 
                        name="senha" 
                        placeholder="Mínimo 8 caracteres"
                        required
                    >
                    <span class="erro" id="erro-senha"></span>
                </div>

                <button type="submit" class="btn btn-primario">Entrar</button>
            </form>

            <p class="link-cadastro">
                Não tem conta? <a href="../Cadastro/index.html">Cadastre-se</a>
            </p>
        </article>
    </main>

    <script src="js/login.js" type="module"></script>
</body>
</html>
