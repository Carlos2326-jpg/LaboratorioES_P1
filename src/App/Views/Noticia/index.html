<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícia – Blog de Notícias</title>
    <link rel="stylesheet" href="../_shared/css/base.css">
    <link rel="stylesheet" href="../_shared/css/components.css">
    <style>
        .noticia-page {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .noticia-conteudo {
            background: var(--cor-branco);
            border-radius: var(--raio);
            padding: 2rem;
            box-shadow: var(--sombra);
        }

        .noticia-categoria {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--cor-primaria);
            margin-bottom: 0.75rem;
            display: block;
        }

        .noticia-titulo {
            font-size: 1.75rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 0.75rem;
        }

        .noticia-subtitulo {
            font-size: 1.1rem;
            color: var(--cor-texto-suave);
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .noticia-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--cor-texto-suave);
            border-top: 1px solid var(--cor-borda);
            border-bottom: 1px solid var(--cor-borda);
            padding: 0.75rem 0;
            margin-bottom: 1.5rem;
        }

        .noticia-imagem-destaque {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: var(--raio);
            margin-bottom: 1.5rem;
            background: var(--cor-borda);
        }

        .noticia-corpo {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--cor-texto);
        }

        .noticia-corpo p {
            margin-bottom: 1rem;
        }

        .noticia-tags {
            margin-top: 2rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .sidebar-card {
            background: var(--cor-branco);
            border-radius: var(--raio);
            padding: 1.25rem;
            box-shadow: var(--sombra);
        }

        .sidebar-card h3 {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--cor-primaria);
        }

        .relacionadas-lista {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .relacionadas-lista li a {
            font-size: 0.875rem;
            color: var(--cor-texto);
            font-weight: 500;
            line-height: 1.4;
        }

        .relacionadas-lista li a:hover {
            color: var(--cor-primaria);
        }

        .relacionadas-lista li span {
            display: block;
            font-size: 0.75rem;
            color: var(--cor-texto-suave);
            margin-top: 0.2rem;
        }

        @media (max-width: 768px) {
            .noticia-page {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar__inner">
            <a href="../Home/index.html" class="navbar__logo">📰 Blog de Notícias</a>
            <div class="navbar__busca">
                <input type="text" id="campo-busca" placeholder="Buscar notícias...">
                <button class="btn btn-primario btn-sm" onclick="buscar()">Buscar</button>
            </div>
            <div class="navbar__acoes">
                <a href="../Usuario/index.html" class="btn btn-secundario btn-sm">Entrar</a>
            </div>
        </div>
    </nav>

    <div class="noticia-page">
        <main id="noticia-conteudo" class="noticia-conteudo">
            <p>Carregando notícia...</p>
        </main>

        <aside class="sidebar">
            <div class="sidebar-card">
                <h3>Notícias Relacionadas</h3>
                <ul class="relacionadas-lista" id="relacionadas">
                    <li><a href="#">Carregando...</a></li>
                </ul>
            </div>
        </aside>
    </div>

    <footer class="footer">
        © 2026 Blog de Notícias. Todos os direitos reservados.
    </footer>

    <script src="js/noticia.js" type="module"></script>
    <script>
        function buscar() {
            const termo = document.getElementById('campo-busca').value.trim();
            if (termo) window.location.href = `../Home/index.html?busca=${encodeURIComponent(termo)}`;
        }
    </script>
</body>
</html>
